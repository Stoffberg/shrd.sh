name = "shrd-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "shrd.stoff.dev/*", zone_name = "stoff.dev" }
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[vars]
BASE_URL = "https://shrd.stoff.dev"

[[kv_namespaces]]
binding = "CONTENT"
id = "3e59e9713df94c83950548e5ccc46faa"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "shrd-storage"

[[d1_databases]]
binding = "DB"
database_name = "shrd-db"
database_id = "9122485c-f107-4333-ad96-f3fd9873ae35"
migrations_dir = "../../packages/db/migrations"

[triggers]
crons = ["0 * * * *"]
